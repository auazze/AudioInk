name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # windows-latest: the primary target platform; Wails on Linux would also
    # need webkit2gtk dev headers just to compile.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # main.go embeds frontend/dist, so the frontend must be built
      # before any Go compilation (including go vet / go test).
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
