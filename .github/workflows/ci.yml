name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # windows-latest: the primary target platform; Wails on Linux would also
    # need webkit2gtk dev headers just to compile.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # frontend/wailsjs bindings and frontend/dist (go:embed) are generated,
      # not committed — `wails build` produces both, so it must run before any
      # Go compilation (including go vet / go test).
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build app
        run: wails build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
